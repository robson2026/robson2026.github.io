<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Banner rdaguiar.com.br">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b2d8d8"/>
      <stop offset="50%" stop-color="#d8b2b2"/>
      <stop offset="100%" stop-color="#d8d8b2"/>
    </linearGradient>
    <style>
      .product-icon { fill:none; stroke:#000; stroke-width:3; }
      .text-bg { fill: rgba(255,255,255,0.8); }
      .site-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 48px; fill: #000; }
    </style>
  </defs>

  <rect width="1600" height="300" fill="url(#bgGradient)" />

  <!-- Produtos variados espalhados -->
  <!-- Curso -->
  <rect x="50" y="50" width="80" height="60" class="product-icon" rx="8" ry="8"/>
  <circle cx="90" cy="80" r="10" class="product-icon"/>
  <line x1="70" y1="110" x2="110" y2="110" stroke="#000" stroke-width="3"/>

  <!-- Eletrodoméstico - cafeteira -->
  <rect x="180" y="70" width="60" height="80" class="product-icon" rx="10" ry="10"/>
  <rect x="200" y="90" width="20" height="40" class="product-icon"/>
  <circle cx="230" cy="130" r="15" class="product-icon"/>

  <!-- Celular -->
  <rect x="280" y="60" width="50" height="100" class="product-icon" rx="12" ry="12"/>
  <circle cx="305" cy="150" r="5" class="product-icon"/>

  <!-- Computador -->
  <rect x="370" y="80" width="120" height="80" class="product-icon" rx="10" ry="10"/>
  <rect x="400" y="160" width="60" height="10" class="product-icon"/>

  <!-- Carrinho -->
  <circle cx="550" cy="140" r="15" class="product-icon"/>
  <circle cx="600" cy="140" r="15" class="product-icon"/>
  <polyline points="530,120 580,120 610,90 540,90" class="product-icon" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Câmera -->
  <rect x="670" y="70" width="80" height="60" class="product-icon" rx="10" ry="10"/>
  <circle cx="710" cy="100" r="20" class="product-icon"/>
  <rect x="740" y="80" width="10" height="10" class="product-icon"/>

  <!-- Fones de ouvido -->
  <circle cx="850" cy="90" r="30" class="product-icon"/>
  <rect x="820" y="90" width="10" height="50" class="product-icon"/>
  <rect x="880" y="90" width="10" height="50" class="product-icon"/>

  <!-- Livros -->
  <rect x="950" y="80" width="60" height="80" class="product-icon" rx="5" ry="5"/>
  <line x1="950" y1="100" x2="1010" y2="100" stroke="#000" stroke-width="3"/>
  <line x1="950" y1="120" x2="1010" y2="120" stroke="#000" stroke-width="3"/>

  <!-- Relógio -->
  <circle cx="1150" cy="110" r="40" class="product-icon"/>
  <line x1="1150" y1="110" x2="1150" y2="80" stroke="#000" stroke-width="3"/>
  <line x1="1150" y1="110" x2="1180" y2="110" stroke="#000" stroke-width="3"/>

  <!-- Celular 2 -->
  <rect x="1300" y="70" width="50" height="100" class="product-icon" rx="12" ry="12"/>
  <circle cx="1325" cy="160" r="5" class="product-icon"/>
</svg>