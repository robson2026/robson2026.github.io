<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computadores - RDAguiar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root { --primary: 30 64 175; }
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="tail-container bg-slate-50 text-slate-700">
    <!-- Navbar (copie da página sobre-mim e altere o link ativo) -->

    <!-- Banner -->
    <div class="h-80 bg-slate-900 flex items-center justify-center relative overflow-hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-64 h-64 text-blue-600/10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2" />
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
            <h1 class="heading-font text-white text-5xl md:text-6xl font-semibold">Computadores</h1>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-16">
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <!-- === PRODUTO 1 - DUPLIQUE QUANTAS VEZES PRECISAR === -->
            <div class="product-card bg-white rounded-3xl overflow-hidden border border-slate-100">
                <img src="assets/img/seu-pc-1.jpg" alt="Nome do Produto" 
                     class="w-full h-56 object-cover">
                <div class="p-6">
                    <h3 class="font-semibold text-xl mb-2">Nome Completo do Produto</h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-6">
                        Descrição curta e atrativa do produto (2-4 linhas).
                    </p>
                    <a href="https://SEU-LINK-DE-AFILIADO" target="_blank"
                       class="block w-full text-center bg-blue-700 hover:bg-blue-800 text-white font-semibold py-4 rounded-2xl transition-colors">
                        Ver oferta →
                    </a>
                </div>
            </div>

        </div>
    </div>

    <footer class="bg-slate-900 text-slate-400 py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm">© 2026 RDAguiar. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
